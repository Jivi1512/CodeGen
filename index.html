<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIGen Core Workspace</title>
    <!-- Silently intercept and suppress benign sandboxed environment WebSocket or HMR connection failures -->
    <script>
      (function() {
        const isBenignError = (msg) => {
          if (!msg) return false;
          const str = String(msg).toLowerCase();
          return (
            str.includes('websocket') ||
            str.includes('hmr') ||
            str.includes('vite') ||
            str.includes('connection reset') ||
            str.includes('closed without opened') ||
            str.includes('ws://') ||
            str.includes('wss://')
          );
        };

        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason;
          if (reason) {
            const msg = typeof reason === 'string' ? reason : (reason.message || reason.stack || '');
            if (isBenignError(msg)) {
              event.preventDefault();
              event.stopPropagation();
            }
          }
        }, true);

        window.addEventListener('error', function(event) {
          const msg = event.message || '';
          if (isBenignError(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
